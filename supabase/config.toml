project_id = "uugodzwxuxgfwujnwpuq"

# Both functions self-validate auth: storage mode requires a real user JWT
# and is checked manually; body mode (de-risk/testing) is intentionally open
# so any anon-key caller can render a PDF they hold.
[functions.pdf-render-page]
verify_jwt = false

[functions.pdf-doc-init]
verify_jwt = false

# Account deletion is destructive and self-scoped: the gateway requires a valid
# project JWT, and the function re-derives the caller's userId from that token
# so a user can only ever delete their own account.
[functions.delete-account]
verify_jwt = true

# Checkout requires a signed-in user (the function derives the buyer from the
# JWT); the webhook is called by Stripe, which has no Supabase JWT — it
# authenticates with the Stripe signature instead.
[functions.create-checkout-session]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false
